// Storage
const ST={
  get:k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch{}},
  list:p=>{try{const ks=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(p))ks.push(k);}return ks;}catch{return[];}},
};

function calcolaLivello(r){
  let tp=0,ts=0;
  for(const[id,s]of Object.entries(r)){const p=PESI[id]||1;ts+=s*p;tp+=p;}
  const m=ts/tp;
  if(m<=1.4)return"BASE";if(m<=2.0)return"ESSENZIALE";if(m<=3.0)return"STANDARD";if(m<=4.0)return"AVANZATA";return"PREMIUM";
}

function getNumero(ini){
  const y=new Date().getFullYear(),k=`cnt:${ini}:${y}`;
  let n=1;const r=ST.get(k);if(r)n=parseInt(r.value)+1;
  ST.set(k,String(n));
  return`${ini}-${y}-${String(n).padStart(3,"0")}`;
}

function salvaPrev(rec){ST.set("prev:"+rec.numero,JSON.stringify(rec));}

function caricaArchivio(){
  return ST.list("prev:").map(k=>{try{const r=ST.get(k);return r?JSON.parse(r.value):null;}catch{return null;}}).filter(Boolean).sort((a,b)=>b.numero.localeCompare(a.numero));
}

function fmt(n){return n.toLocaleString("it-IT",{minimumFractionDigits:2});}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// Drive upload
async function driveUpload(token,name,bytes){
  const meta={name,parents:[DRIVE_FOLDER_ID],mimeType:"application/pdf"};
  const form=new FormData();
  form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
  form.append("file",new Blob([bytes],{type:"application/pdf"}));
  await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
    method:"POST",headers:{Authorization:"Bearer "+token},body:form
  });
}

  doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(100,100,100);

<script type="text/babel">
const{useState,useEffect,useRef}=React;
const btnP={background:BRAND,color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"};
const btnS={background:"#fff",color:BRAND,border:"2px solid "+BRAND,borderRadius:10,padding:"10px 24px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"};
const INP={width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #ddd",fontSize:14,outline:"none",background:"#fff",boxSizing:"border-box",fontFamily:"inherit"};

function Card({c,s,onClick,sel}){
  return <div onClick={onClick} style={{background:"#fff",borderRadius:14,boxShadow:sel?"0 0 0 3px "+BRAND:"0 2px 14px rgba(0,0,0,.08)",padding:"18px 22px",cursor:onClick?"pointer":"default",border:sel?"2px solid "+BRAND:"2px solid transparent",transition:"all .2s",...s}}>{c}</div>;
}
function Bdg({t,col}){return <span style={{background:col||BRAND,color:"#fff",borderRadius:20,padding:"2px 11px",fontSize:11,fontWeight:700}}>{t}</span>;}

function StepBar({cur}){
  const ST=["Operatore","Paziente","Visita","Risultato","Dispositivo","Accessori","Proposta"];
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>{ST.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{width:24,height:24,borderRadius:"50%",background:i<cur?BRAND:i===cur?ACCENT:"#ddd",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10}}>{i<cur?"✓":i+1}</div><span style={{fontSize:8,color:i===cur?ACCENT:i<cur?BRAND:"#aaa",whiteSpace:"nowrap"}}>{s}</span></div>{i<ST.length-1&&<div style={{width:14,height:2,background:i<cur?BRAND:"#ddd",marginBottom:12}}/>}</div>)}</div>;
}

function Hdr({ap}){
  return <div style={{background:BRAND,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
    <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👂</div>
    <div><div style={{color:"#fff",fontWeight:900,fontSize:14}}>Otosense Srl</div><div style={{color:"rgba(255,255,255,.6)",fontSize:10}}>Studio di Riabilitazione Audiologica</div></div>
    {ap&&<div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}><div style={{width:32,height:32,borderRadius:"50%",background:ap.colore,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:13}}>{ap.iniziali}</div><div style={{textAlign:"right"}}><div style={{color:"#fff",fontSize:12,fontWeight:700}}>{ap.nome}</div><div style={{color:"rgba(255,255,255,.55)",fontSize:9}}>Audioprotesista</div></div></div>}
  </div>;
}

function Lay({children,cur,ap}){
  return <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#e8f4f8,#f5f8fa,#fff)",fontFamily:"'Segoe UI',Arial,sans-serif",paddingBottom:48}}>
    <Hdr ap={ap}/>
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 16px"}}>
      {cur!=null&&<StepBar cur={cur}/>}
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 14px rgba(0,0,0,.08)",padding:"18px 22px",minHeight:320}}>{children}</div>
    </div>
  </div>;
}

function DriveBnr({status,onLogin}){
  if(status==="ok") return <div style={{background:"#f0fdf4",border:"1.5px solid #1a9e5e",borderRadius:9,padding:"7px 13px",marginBottom:10,fontSize:12,display:"flex",alignItems:"center",gap:8}}><span>✅</span><span style={{color:"#1a9e5e",fontWeight:700}}>Google Drive connesso — PDF salvato automaticamente</span></div>;
  if(status==="loading") return <div style={{background:"#fffbf0",border:"1.5px solid #e8a020",borderRadius:9,padding:"7px 13px",marginBottom:10,fontSize:12}}><span style={{color:"#b8860b",fontWeight:700}}>⏳ Connessione in corso...</span></div>;
  if(status==="error") return <div style={{background:"#fff5f5",border:"1.5px solid "+RED,borderRadius:9,padding:"7px 13px",marginBottom:10,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:RED,fontWeight:700}}>⚠️ Drive non connesso</span><button onClick={onLogin} style={{...btnS,fontSize:11,padding:"4px 12px",color:RED,borderColor:RED}}>Riprova</button></div>;
  return <div style={{background:"#f0f8fb",border:"1.5px solid "+BRAND,borderRadius:9,padding:"9px 13px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
    <div><div style={{fontWeight:700,fontSize:12,color:BRAND}}>☁️ Salvataggio automatico su Google Drive</div><div style={{fontSize:11,color:"#888",marginTop:1}}>Accedi per salvare i PDF nella cartella condivisa</div></div>
    <button onClick={onLogin} style={{...btnP,fontSize:12,padding:"8px 16px"}}>Accedi con Google</button>
  </div>;
}

function Archivio({ap,onBack}){
  const[lista,setLista]=useState([]);
  useEffect(()=>{const all=caricaArchivio();setLista(ap?all.filter(r=>r.audioprotesista&&r.audioprotesista.id===ap.id):all);},[]);
  return <Lay ap={ap}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <h2 style={{color:BRAND,fontSize:19,fontWeight:900}}>📋 Archivio — {lista.length} preventivi</h2>
      <button style={{...btnS,fontSize:12,padding:"8px 16px"}} onClick={onBack}>← Indietro</button>
    </div>
    {lista.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa"}}><div style={{fontSize:36}}>📭</div><div>Nessun preventivo</div></div>}
    {lista.map(r=>{
      const lv=LIVELLI.find(l=>l.id===r.livello);
      const fam=FAMIGLIE.find(f=>f.id===r.famiglia);
      const ap2=AUDIOPROTESISTI.find(a=>r.audioprotesista&&a.id===r.audioprotesista.id);
      const rec={...r,livelloObj:lv||r.livelloObj,famigliaObj:fam||r.famigliaObj,audioprotesista:ap2||r.audioprotesista};
      return <div key={r.numero} style={{border:"1.5px solid #e0e0e0",borderRadius:12,padding:"13px 16px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div><div style={{fontWeight:900,fontSize:15,color:BRAND}}>{r.numero}</div><div style={{fontWeight:700,fontSize:13}}>{r.paziente&&r.paziente.nome} {r.paziente&&r.paziente.cognome}</div><div style={{fontSize:11,color:"#888"}}>{r.data}</div></div>
          <div style={{fontWeight:900,fontSize:16,color:BRAND}}>€ {fmt(r.totaleFinale)}</div>
        </div>
        <button onClick={()=>{const doc=buildPDF(rec);const b=doc.output("blob");const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="Preventivo_"+r.numero+".pdf";document.body.appendChild(a);a.click();document.body.removeChild(a);}} style={{...btnP,fontSize:12,padding:"7px 16px",background:RED}}>📄 Scarica PDF</button>
      </div>;
    })}
  </Lay>;
}

function App(){
  const[screen,setScreen]=useState("login");
  const[ap,setAp]=useState(null);
  const[step,setStep]=useState(0);
  const[paz,setPaz]=useState({nome:"",cognome:"",data:""});
  const[risp,setRisp]=useState({});
  const[dIdx,setDIdx]=useState(0);
  const[livello,setLivello]=useState(null);
  const[uso,setUso]=useState("bino");
  const[fam,setFam]=useState(null);
  const[accSel,setAccSel]=useState([]);
  const[promo,setPromo]=useState(false);
  const[numPrev,setNumPrev]=useState(null);
  const[salvato,setSalvato]=useState(false);
  const[drvTok,setDrvTok]=useState(null);
  const[drvSt,setDrvSt]=useState("idle");
  const tokRef=useRef(null);

  useEffect(()=>{
    if(!window.google)return;
    tokRef.current=window.google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,
      callback:r=>{if(r.error){setDrvSt("error");return;}setDrvTok(r.access_token);setDrvSt("ok");}
    });
  },[]);

  const loginDrive=()=>{setDrvSt("loading");if(tokRef.current)tokRef.current.requestAccessToken();else setDrvSt("error");};

  const lv=LIVELLI.find(l=>l.id===livello);
  const famObj=FAMIGLIE.find(f=>f.id===fam);
  const pb=famObj&&livello?(uso==="bino"?famObj.livelli[livello]&&famObj.livelli[livello].bino:famObj.livelli[livello]&&famObj.livelli[livello].mono)||0:0;
  const sp=PROMO_MAP[livello]||0;
  const totAcc=accSel.reduce((a,n)=>a+(ACC[n]&&ACC[n].p?ACC[n].p:0),0);
  const tot=pb*(1-sp/100)+totAcc;

  const rispondi=(id,score)=>{
    const n={...risp,[id]:score};setRisp(n);
    if(dIdx<DOMANDE.length-1)setDIdx(dIdx+1);
    else{setLivello(calcolaLivello(n));setStep(3);}
  };

  const toggleAcc=n=>setAccSel(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  const reset=()=>{setStep(0);setPaz({nome:"",cognome:"",data:""});setRisp({});setDIdx(0);setLivello(null);setFam(null);setUso("bino");setAccSel([]);setPromo(false);setNumPrev(null);setSalvato(false);};

  const handlePDF=async()=>{
    let num=numPrev;
    if(!num){num=getNumero(ap.iniziali);setNumPrev(num);}
    const oggi=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
    const rec={numero:num,data:oggi,audioprotesista:ap,paziente:paz,livello,famiglia:fam,uso,scontoApplicato:sp,prezzoBase:pb,accessoriSel:accSel,totaleFinale:tot,risposte:risp,livelloObj:lv,famigliaObj:famObj};
    if(!salvato){salvaPrev(rec);setSalvato(true);}
    try{
      const doc=buildPDF(rec);
      const blob=doc.output("blob");
      // Scarica localmente
      const u=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=u;a.download="Preventivo_"+num+".pdf";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(u),5000);
      // Carica su Drive
      if(drvTok){
        const bytes=doc.output("arraybuffer");
        await driveUpload(drvTok,"Preventivo_"+num+".pdf",bytes);
      }
    }catch(e){console.error("PDF error",e);}
  };

  // LOGIN
  if(screen==="login") return <Lay cur={null} ap={null}>
    <div style={{textAlign:"center",marginBottom:28}}>
      <div style={{fontSize:48,marginBottom:10}}>👂</div>
      <h2 style={{color:BRAND,fontSize:22,fontWeight:900,marginBottom:6}}>Otosense Srl</h2>
      <p style={{color:"#666",fontSize:13}}>Seleziona il tuo nome per iniziare</p>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
      {AUDIOPROTESISTI.map(a=><div key={a.id} onClick={()=>{setAp(a);setScreen("wf");}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:12,border:"2px solid #e0e0e0",cursor:"pointer",background:"#fff"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=a.colore;}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";}}>
        <div style={{width:46,height:46,borderRadius:"50%",background:a.colore,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:16}}>{a.iniziali}</div>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{a.nome}</div><div style={{fontSize:11,color:"#aaa"}}>Audioprotesista</div></div>
        <div style={{color:"#ccc",fontSize:20}}>→</div>
      </div>)}
    </div>
    <div style={{borderTop:"1px solid #eee",paddingTop:16,textAlign:"center"}}>
      <button style={{...btnS,fontSize:12}} onClick={()=>setScreen("archivio")}>📋 Archivio Preventivi</button>
    </div>
  </Lay>;

  if(screen==="archivio") return <Archivio ap={ap} onBack={()=>setScreen(ap?"wf":"login")}/>;

  // STEP 0: PAZIENTE
  if(step===0) return <Lay cur={0} ap={ap}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{color:BRAND,fontSize:19,fontWeight:900}}>Dati del Paziente</h2>
      <div style={{display:"flex",gap:8}}>
        <button style={{...btnS,fontSize:11,padding:"6px 12px"}} onClick={()=>setScreen("archivio")}>📋</button>
        <button style={{...btnS,fontSize:11,padding:"6px 12px",color:RED,borderColor:RED}} onClick={()=>{setAp(null);setScreen("login");}}>⇦</button>
      </div>
    </div>
    <DriveBnr status={drvSt} onLogin={loginDrive}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <div><label style={{display:"block",fontWeight:600,fontSize:13,marginBottom:6}}>Nome</label><input style={INP} value={paz.nome} onChange={e=>setPaz({...paz,nome:e.target.value})} placeholder="Es. Mario"/></div>
      <div><label style={{display:"block",fontWeight:600,fontSize:13,marginBottom:6}}>Cognome</label><input style={INP} value={paz.cognome} onChange={e=>setPaz({...paz,cognome:e.target.value})} placeholder="Es. Rossi"/></div>
    </div>
    <div><label style={{display:"block",fontWeight:600,fontSize:13,marginBottom:6}}>Data di nascita</label><input type="date" style={{...INP,width:"auto"}} value={paz.data} onChange={e=>setPaz({...paz,data:e.target.value})}/></div>
    <div style={{marginTop:26,display:"flex",justifyContent:"flex-end"}}><button style={btnP} onClick={()=>setStep(1)}>Avvia Valutazione →</button></div>
  </Lay>;

  // STEP 1: QUESTIONARIO
  if(step===1){
    const d=DOMANDE[dIdx];
    return <Lay cur={1} ap={ap}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:5}}>
        <span style={{fontWeight:600,color:BRAND}}>{d.cat}</span><span>{dIdx+1}/{DOMANDE.length}</span>
      </div>
      <div style={{background:"#e8e8e8",borderRadius:20,height:5,marginBottom:18,overflow:"hidden"}}>
        <div style={{width:(dIdx/DOMANDE.length*100)+"%",background:BRAND,height:"100%",borderRadius:20,transition:"width .4s"}}/>
      </div>
      <h3 style={{fontSize:15,fontWeight:800,color:"#1a1a2e",marginBottom:16,lineHeight:1.4}}>{d.testo}</h3>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {d.opzioni.map((op,i)=><div key={i} onClick={()=>rispondi(d.id,op.score)} style={{padding:"11px 15px",borderRadius:10,border:"2px solid #e0e0e0",cursor:"pointer",display:"flex",alignItems:"center",gap:11}} onMouseEnter={e=>{e.currentTarget.style.borderColor=BRAND;e.currentTarget.style.background="#f0f8fb";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}>
          <div style={{width:26,height:26,borderRadius:"50%",background:"#f0f8fb",color:BRAND,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div>
          <span style={{fontSize:13,color:"#333",lineHeight:1.4}}>{op.label}</span>
        </div>)}
      </div>
      <div style={{marginTop:16}}><button style={{...btnS,fontSize:12,padding:"7px 14px"}} onClick={()=>dIdx>0?setDIdx(dIdx-1):setStep(0)}>← Indietro</button></div>
    </Lay>;
  }

  // STEP 3: RISULTATO
  if(step===3){
    const lObj=LIVELLI.find(l=>l.id===livello);
    return <Lay cur={2} ap={ap}>
      <div style={{textAlign:"center",marginBottom:12}}><h2 style={{fontSize:20,fontWeight:900}}>🤖 Livello Raccomandato</h2></div>
      <div style={{background:lObj.color,borderRadius:14,padding:"16px 20px",color:"#fff",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:40,fontWeight:900,lineHeight:1,marginBottom:6}}>{lObj.label}</div>
        <div style={{fontSize:12,fontStyle:"italic",marginBottom:9}}>{lObj.tagline}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>{lObj.vantaggi.map((v,i)=><span key={i} style={{background:"rgba(255,255,255,.2)",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>+ {v}</span>)}</div>
      </div>
      <div style={{background:"#f0f8fb",border:"1.5px solid "+lObj.color,borderRadius:10,padding:"11px 14px",marginBottom:12}}>
        <p style={{fontSize:12,color:"#444",lineHeight:1.6}}>{MOTIVAZIONI[livello]}</p>
      </div>
      <div style={{background:"#fffbf0",border:"1.5px solid #f0d080",borderRadius:9,padding:"10px 13px",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:"#b8860b",marginBottom:7}}>⚙️ Override</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{LIVELLI.map(l=><button key={l.id} onClick={()=>setLivello(l.id)} style={{padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:livello===l.id?l.color:"#ddd",background:livello===l.id?l.color:"#fff",color:livello===l.id?"#fff":"#555",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{l.label}</button>)}</div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button style={btnS} onClick={()=>{setDIdx(DOMANDE.length-1);setStep(1);}}>← Modifica</button>
        <button style={btnP} onClick={()=>setStep(4)}>Scegli Dispositivo →</button>
      </div>
    </Lay>;
  }

  // STEP 4: DISPOSITIVO
  if(step===4){
    const ff=FAMIGLIE.filter(f=>f.livelli[livello]);
    return <Lay cur={3} ap={ap}>
      <h2 style={{color:BRAND,marginBottom:12,fontSize:19,fontWeight:900}}>Scelta del Dispositivo</h2>
      <div style={{display:"flex",gap:8,marginBottom:14}}>{[["bino","👂👂 Binaurale"],["mono","👂 Monaurale"]].map(([u,lb])=><button key={u} onClick={()=>setUso(u)} style={{flex:1,padding:"9px 0",borderRadius:9,border:"2px solid",borderColor:uso===u?BRAND:"#ddd",background:uso===u?BRAND:"#fff",color:uso===u?"#fff":"#555",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{lb}</button>)}</div>
      {[{t:"🎧 RIC",ids:["moxi_s_r","moxi_s_312"]},{t:"🔊 BTE",ids:["stride_vpr","stride_vm312"]},{t:"👁️ Endoauricolare",ids:["insera_s_r","insera_s_nw"]},{t:"⚡ Instant Fit Quix",ids:["quix_r","quix_nw"]}].map(grp=>{
        const items=ff.filter(f=>grp.ids.includes(f.id));
        if(!items.length)return null;
        return <div key={grp.t} style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:6,textTransform:"uppercase"}}>{grp.t}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {items.map(f=>{
              const pr=uso==="bino"?f.livelli[livello]&&f.livelli[livello].bino:f.livelli[livello]&&f.livelli[livello].mono;
              return <Card key={f.id} sel={fam===f.id} onClick={()=>{setFam(f.id);setPromo(false);setAccSel([]);}} s={{padding:"10px 12px"}} c={<>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:17}}>{f.icona}</span>{f.ricaricabile&&<Bdg t="Ricar." col={GREEN}/>}</div>
                <div style={{fontWeight:800,fontSize:12,marginBottom:1}}>{f.nome}</div>
                <div style={{fontSize:10,color:"#888",marginBottom:5}}>{f.sottotipo}</div>
                <div style={{fontWeight:800,fontSize:14,color:BRAND}}>€ {pr?pr.toLocaleString("it-IT"):"—"}</div>
                {fam===f.id&&f.note&&<p style={{margin:"6px 0 0",fontSize:10,color:"#888",fontStyle:"italic"}}>{f.note}</p>}
              </>}/>;
            })}
          </div>
        </div>;
      })}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
        <button style={btnS} onClick={()=>setStep(3)}>← Indietro</button>
        <button style={{...btnP,opacity:fam?1:.5}} onClick={()=>fam&&setStep(5)} disabled={!fam}>Avanti →</button>
      </div>
    </Lay>;
  }

  // STEP 5: ACCESSORI
  if(step===5){
    const ad=famObj?famObj.accessori:[];
    return <Lay cur={4} ap={ap}>
      <h2 style={{color:BRAND,marginBottom:12,fontSize:19,fontWeight:900}}>Accessori</h2>
      <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
        {ad.map(nome=>{
          const a=ACC[nome];
          if(nome==="Ricevitore"&&!(famObj&&famObj.ricevitore))return null;
          const nd=nome==="Ricevitore"?(uso==="bino"?"Ricevitori":"Ricevitore"):nome;
          const inc=a&&(a.incluso||(a.inclusoPerModello&&a.inclusoPerModello.includes(fam)));
          const sel=accSel.includes(nome);
          return <div key={nome} onClick={()=>!inc&&a&&a.p&&toggleAcc(nome)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 13px",borderRadius:9,border:"2px solid",borderColor:inc?"#1a9e5e":sel?BRAND:"#e0e0e0",background:inc?"#f0fdf4":sel?"#e8f7fb":"#fff",cursor:!inc&&a&&a.p?"pointer":"default"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:600,fontSize:13}}>{nd}</span>{inc&&<span style={{background:GREEN,color:"#fff",borderRadius:20,padding:"1px 8px",fontSize:9,fontWeight:700}}>Incluso</span>}</div>
              <div style={{fontSize:10,color:"#888"}}>{inc?"Incluso":a&&a.p?"€ "+a.p:"-"}</div>
            </div>
            {!inc&&a&&a.p&&<div style={{width:20,height:20,borderRadius:"50%",background:sel?BRAND:"#eee",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:800}}>{sel?"✓":"+"}</div>}
          </div>;
        })}
      </div>
      <div style={{background:"#f9f9f9",borderRadius:10,padding:"11px 14px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:2}}><span>Listino</span><span>€ {fmt(pb)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN,fontWeight:700}}><span>Promozione -{sp}%</span><span>- € {fmt(pb*(sp/100))}</span></div>
        <div style={{borderTop:"1.5px solid #ddd",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:800}}>Totale</span><span style={{fontWeight:900,color:BRAND}}>€ {fmt(tot)}</span></div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <button style={btnS} onClick={()=>setStep(4)}>← Indietro</button>
        <button style={btnP} onClick={()=>setStep(6)}>Vai alla Proposta →</button>
      </div>
    </Lay>;
  }

  // STEP 6: PROPOSTA FINALE
  const oggi=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
  return <Lay cur={5} ap={ap}>
    {numPrev&&<div style={{background:"#f0f8fb",border:"1.5px solid "+BRAND,borderRadius:9,padding:"7px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#555"}}>Preventivo n°</span><span style={{fontWeight:900,fontSize:16,color:BRAND}}>{numPrev}</span>{salvato&&<span style={{fontSize:10,background:GREEN,color:"#fff",borderRadius:20,padding:"2px 9px",fontWeight:700}}>✓ Salvato</span>}</div>}
    <DriveBnr status={drvSt} onLogin={loginDrive}/>
    <div style={{background:"linear-gradient(135deg,"+BRAND+",#0d8fad)",borderRadius:12,padding:"14px 18px",color:"#fff",marginBottom:12}}>
      <div style={{fontSize:18,fontWeight:900}}>{paz.nome} {paz.cognome}</div>
      <div style={{fontSize:11,opacity:.8}}>{oggi} · Valida 30 giorni</div>
    </div>
    <div style={{display:"flex",gap:10,alignItems:"center",padding:"9px 13px",background:lv&&lv.light,borderRadius:9,marginBottom:10}}>
      <div style={{width:34,height:34,borderRadius:8,background:lv&&lv.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:15}}>{lv&&lv.num}</div>
      <div><div style={{fontWeight:800,fontSize:13}}>{lv&&lv.label} {lv&&lv.sublabel}</div><div style={{fontSize:10,color:"#666"}}>{lv&&lv.ambiente}</div></div>
    </div>
    <div style={{border:"1.5px solid #d0e8f0",borderRadius:10,padding:"11px 14px",marginBottom:10}}>
      <div style={{fontWeight:800,fontSize:14,marginBottom:2}}>{famObj&&famObj.nome}</div>
      <div style={{fontSize:11,color:"#888"}}>{famObj&&famObj.brand} · {famObj&&famObj.sottotipo} · {uso==="bino"?"Binaurale":"Monaurale"}</div>
    </div>
    {sp>0&&<div style={{marginBottom:12}}>{!promo?
      <div style={{borderRadius:12,overflow:"hidden",border:"2px solid #e8a020"}}>
        <div style={{background:"linear-gradient(135deg,#e8a020,#f0b830)",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#fff",fontWeight:900,fontSize:13}}>⏰ Sconto se prenota oggi — -{sp}%</div>
          <div style={{background:"rgba(255,255,255,.25)",borderRadius:8,padding:"4px 10px",color:"#fff",fontWeight:900,fontSize:18}}>-{sp}%</div>
        </div>
        <div style={{background:"#fffbf0",padding:"12px 16px"}}>
          <p style={{fontSize:12,color:"#555",marginBottom:10}}>Risparmia <strong style={{color:ACCENT}}>€ {fmt(pb*(sp/100))}</strong> prenotando oggi la prova gratuita.</p>
          <button onClick={()=>setPromo(true)} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#e8a020,#f0b830)",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✅ Attiva sconto {sp}%</button>
        </div>
      </div>:
      <div style={{borderRadius:12,border:"2px solid #1a9e5e",background:"#f0fdf4",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:700,color:GREEN}}>✅ Promozione -{sp}% attiva · Risparmio € {fmt(pb*(sp/100))}</span>
        <button onClick={()=>setPromo(false)} style={{background:"none",border:"1px solid #ccc",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
      </div>}
    </div>}
    <div style={{background:"#f8f9fa",borderRadius:10,padding:"11px 14px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:2}}><span>Listino</span><span><s>€ {fmt(pb)}</s></span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN,fontWeight:700,marginBottom:2}}><span>Promozione -{sp}%</span><span>- € {fmt(pb*(sp/100))}</span></div>
      {accSel.map(n=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888"}}><span>{n}</span><span>€ {ACC[n]&&ACC[n].p?ACC[n].p:""}</span></div>)}
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:BRAND,marginTop:3}}><span style={{fontStyle:"italic"}}>Percorso 15 sedute</span><span style={{fontWeight:700}}>Incluso</span></div>
      <div style={{borderTop:"1.5px solid #ddd",marginTop:7,paddingTop:7,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>Totale</span><span style={{fontWeight:900,fontSize:15,color:BRAND}}>€ {fmt(tot)}</span></div>
    </div>
    <div style={{background:"linear-gradient(135deg,"+BRAND+",#0d8fad)",borderRadius:10,padding:"13px 16px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><div style={{fontSize:11,fontWeight:600}}>Totale Percorso Completo · IVA inclusa</div><div style={{fontSize:9,opacity:.6}}>Dispositivi + 15 sedute · Valida 30 giorni</div></div>
      <div style={{fontSize:22,fontWeight:900}}>€ {fmt(tot)}</div>
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button style={btnS} onClick={()=>setStep(5)}>← Modifica</button>
      <button onClick={handlePDF} style={{...btnP,background:RED,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontSize:13}}>
        📄 Genera PDF {drvSt==="ok"&&<span style={{fontSize:10,background:"rgba(255,255,255,.2)",borderRadius:20,padding:"1px 7px"}}>+ ☁️ Drive</span>}
      </button>
      <button style={{...btnP,background:GREEN}} onClick={reset}>+ Nuovo</button>
    </div>
    <p style={{fontSize:10,color:"#aaa",marginTop:8,textAlign:"center"}}>Il PDF viene scaricato sul PC e salvato su Google Drive</p>
  </Lay>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
