function calcolaLivello(r){
  let tp=0,ts=0;
  for(const[id,s]of Object.entries(r)){const p=PESI[id]||1;ts+=s*p;tp+=p;}
  const m=ts/tp;
  if(m<=1.4)return"BASE";if(m<=2.0)return"ESSENZIALE";if(m<=3.0)return"STANDARD";if(m<=4.0)return"AVANZATA";return"PREMIUM";
}

function getNextNumero(iniziali){
  const anno=new Date().getFullYear();
  const key=`preventivi:contatore:${iniziali}:${anno}`;
  let n=1;const r=storage.get(key);if(r)n=parseInt(r.value)+1;
  storage.set(key,String(n));
  return`${iniziali}-${anno}-${String(n).padStart(3,"0")}`;
}
function salvaPreventivo(r){storage.set(`preventivi:archivio:${r.numero}`,JSON.stringify(r));}
function caricaArchivio(){
  const{keys}=storage.list("preventivi:archivio:");
  return(keys||[]).map(k=>{try{const r=storage.get(k);return r?JSON.parse(r.value):null;}catch(_){return null;}}).filter(Boolean).sort((a,b)=>b.numero.localeCompare(a.numero));
}

/* ══ PDF con jsPDF ══ */
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

function App(){

  const[numeroPreventivo,setNumero]=useState(null);
  const[salvato,setSalvato]=useState(false);
  const[driveToken,setDriveToken]=useState(null);
  const[driveStatus,setDriveStatus]=useState("idle");
  const tokenRef=useRef(null);

  useEffect(()=>{if(!window.google)return;tokenRef.current=window.google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,callback:(r)=>{if(r.error){setDriveStatus("error");return;}setDriveToken(r.access_token);setDriveStatus("ok");}});},[]);
  const handleDriveLogin=()=>{setDriveStatus("loading");if(tokenRef.current)tokenRef.current.requestAccessToken();else setDriveStatus("error");};

  const livelloObj=LIVELLI.find(l=>l.id===livello);
  const famigliaObj=FAMIGLIE.find(f=>f.id===famiglia);
  const prezzoBase=famigliaObj&&livello?(uso==="bino"?famigliaObj.livelli[livello]&&famigliaObj.livelli[livello].bino:famigliaObj.livelli[livello]&&famigliaObj.livelli[livello].mono)||0:0;
  const scontoPromo=PROMO_MAP[livello]||0;

  const puoPromo=scontoPromo>0;

  const toggleAcc=n=>setAccSel(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);

    if(window.jspdf){
      try{
        const doc=buildPDF(record);
        // Scarica PDF localmente
        doc.save(`Preventivo_${num}.pdf`);

        if(driveToken){
          const pdfBytes=doc.output("arraybuffer");
          const meta={name:`Preventivo_${num}.pdf`,parents:[DRIVE_FOLDER_ID],mimeType:"application/pdf"};
          const form=new FormData();

          await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
            method:"POST",headers:{Authorization:`Bearer ${driveToken}`},body:form

      }catch(e){
        console.error("PDF error",e);
        // fallback HTML
        const html=buildPrintHTML(record);
        const blob=new Blob([html],{type:"text/html;charset=utf-8"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url;a.download=`Preventivo_${num}.html`;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
      }
    }
  };

  if(schermata==="login")return<Layout ap={null} current={null}><div style={{textAlign:"center",marginBottom:28}}><div style={{fontSize:48,marginBottom:10}}>👂</div><h2 style={{color:BRAND,fontSize:22,fontWeight:900,marginBottom:6}}>Otosense Srl</h2><p style={{color:"#666",fontSize:13}}>Seleziona il tuo nome per iniziare</p></div><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>{AUDIOPROTESISTI.map(a=><div key={a.id} onClick={()=>{setAp(a);setSchermata("workflow");}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:12,border:"2px solid #e0e0e0",cursor:"pointer",background:"#fff",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=a.colore;e.currentTarget.style.background="#f8f8f8";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}><div style={{width:46,height:46,borderRadius:"50%",background:a.colore,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:16,boxShadow:`0 4px 12px ${a.colore}55`}}>{a.iniziali}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:"#1a1a2e"}}>{a.nome}</div><div style={{fontSize:11,color:"#aaa"}}>Audioprotesista - Otosense Srl</div></div><div style={{color:"#ccc",fontSize:20}}>→</div></div>)}</div><div style={{borderTop:"1px solid #eee",paddingTop:16,textAlign:"center"}}><button style={{...btnS,fontSize:12}} onClick={()=>setSchermata("archivio")}>📋 Archivio Preventivi</button></div></Layout>;

  if(schermata==="archivio")return<Archivio ap={ap} onBack={()=>setSchermata(ap?"workflow":"login")}/>;

  if(step===0)return<Layout current={0} ap={ap}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{color:BRAND,fontSize:19,fontWeight:900}}>Dati del Paziente</h2><div style={{display:"flex",gap:8}}><button style={{...btnS,fontSize:11,padding:"6px 12px"}} onClick={()=>setSchermata("archivio")}>📋</button><button style={{...btnS,fontSize:11,padding:"6px 12px",color:RED,borderColor:RED}} onClick={()=>{setAp(null);setSchermata("login");}}>⇦</button></div></div><DriveBanner status={driveStatus} onLogin={handleDriveLogin}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}><div><label style={lbl}>Nome</label><input style={inp} value={paziente.nome} onChange={e=>setPaziente({...paziente,nome:e.target.value})} placeholder="Es. Mario"/></div><div><label style={lbl}>Cognome</label><input style={inp} value={paziente.cognome} onChange={e=>setPaziente({...paziente,cognome:e.target.value})} placeholder="Es. Rossi"/></div></div><div><label style={lbl}>Data di nascita</label><input type="date" style={{...inp,width:"auto"}} value={paziente.data} onChange={e=>setPaziente({...paziente,data:e.target.value})}/></div><div style={{marginTop:26,display:"flex",justifyContent:"flex-end"}}><button style={btnP} onClick={()=>setStep(1)}>Avvia Valutazione →</button></div></Layout>;

  if(step===1){const d=DOMANDE[dIdx];return<Layout current={1} ap={ap}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:5}}><span style={{fontWeight:600,color:BRAND}}>{d.categoria}</span><span>{dIdx+1}/{DOMANDE.length}</span></div><div style={{background:"#e8e8e8",borderRadius:20,height:5,marginBottom:18,overflow:"hidden"}}><div style={{width:`${(dIdx/DOMANDE.length)*100}%`,background:BRAND,height:"100%",borderRadius:20,transition:"width .4s"}}/></div><h3 style={{fontSize:15,fontWeight:800,color:"#1a1a2e",marginBottom:16,lineHeight:1.4}}>{d.testo}</h3><div style={{display:"flex",flexDirection:"column",gap:8}}>{d.opzioni.map((op,i)=><div key={i} onClick={()=>rispondi(d.id,op.score)} style={{padding:"11px 15px",borderRadius:10,border:"2px solid #e0e0e0",cursor:"pointer",background:"#fff",display:"flex",alignItems:"center",gap:11,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=BRAND;e.currentTarget.style.background="#f0f8fb";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}><div style={{width:26,height:26,borderRadius:"50%",background:"#f0f8fb",color:BRAND,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div><span style={{fontSize:13,color:"#333",lineHeight:1.4}}>{op.label}</span></div>)}</div><div style={{marginTop:16,display:"flex",justifyContent:"space-between"}}><button style={{...btnS,fontSize:12,padding:"7px 14px"}} onClick={()=>dIdx>0?setDIdx(dIdx-1):setStep(0)}>← Indietro</button></div></Layout>;}

  if(step===3){const lObj=LIVELLI.find(l=>l.id===livello);return<Layout current={2} ap={ap}><div style={{textAlign:"center",marginBottom:12}}><div style={{fontSize:11,color:"#888",marginBottom:2}}>🤖 Algoritmo clinico Otosense</div><h2 style={{fontSize:20,fontWeight:900,color:"#1a1a2e"}}>Livello Raccomandato</h2></div><div style={{background:lObj.color,borderRadius:14,padding:"16px 20px",color:"#fff",marginBottom:14,textAlign:"center"}}><div style={{fontSize:40,fontWeight:900,lineHeight:1,marginBottom:6}}>{lObj.label}</div><div style={{fontSize:12,opacity:.85,fontStyle:"italic",marginBottom:9}}>{lObj.tagline}</div><div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>{(lObj.vantaggi||[]).map((v,i)=><span key={i} style={{background:"rgba(255,255,255,.2)",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>+ {v}</span>)}</div></div><div style={{background:"#f0f8fb",border:`1.5px solid ${lObj.color}`,borderRadius:10,padding:"11px 14px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:lObj.color,marginBottom:5}}>Motivazione clinica</div><p style={{fontSize:12,color:"#444",lineHeight:1.6,margin:0}}>{MOTIVAZIONI[livello]}</p></div><div style={{marginBottom:12}}><ScoreBar label="🌍 Ambienti" score={risposte.env||0} color={lObj.color}/><ScoreBar label="🔊 Rumore" score={risposte.rumore||0} color={lObj.color}/><ScoreBar label="👥 Vita sociale" score={risposte.social||0} color={lObj.color}/><ScoreBar label="🗣️ Ascolto" score={risposte.ascolto||0} color={lObj.color}/><ScoreBar label="🎯 Aspettative" score={risposte.aspettativa||0} color={lObj.color}/><ScoreBar label="💶 Investimento" score={risposte.budget||0} color={lObj.color}/></div><div style={{background:"#fffbf0",border:"1.5px solid #f0d080",borderRadius:9,padding:"10px 13px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:"#b8860b",marginBottom:7}}>⚙️ Override</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{LIVELLI.map(l=><button key={l.id} onClick={()=>setLivello(l.id)} style={{padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:livello===l.id?l.color:"#ddd",background:livello===l.id?l.color:"#fff",color:livello===l.id?"#fff":"#555",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{l.label}</button>)}</div></div><div style={{display:"flex",justifyContent:"space-between"}}><button style={btnS} onClick={()=>{setDIdx(DOMANDE.length-1);setStep(1);}}>← Modifica</button><button style={btnP} onClick={()=>setStep(4)}>Scegli Dispositivo →</button></div></Layout>;}

  if(step===4){const ff=FAMIGLIE.filter(f=>f.livelli[livello]);return<Layout current={3} ap={ap}><h2 style={{color:BRAND,marginBottom:4,fontSize:19,fontWeight:900}}>Scelta del Dispositivo</h2><div style={{background:livelloObj.light,borderRadius:8,padding:"5px 12px",marginBottom:12,fontSize:12,color:livelloObj.color,fontWeight:700}}>{livelloObj.label} - {livelloObj.sublabel}</div><div style={{display:"flex",gap:8,marginBottom:14}}>{[["bino","👂👂 Binaurale"],["mono","👂 Monaurale"]].map(([u,lb])=><button key={u} onClick={()=>setUso(u)} style={{flex:1,padding:"9px 0",borderRadius:9,border:"2px solid",borderColor:uso===u?BRAND:"#ddd",background:uso===u?BRAND:"#fff",color:uso===u?"#fff":"#555",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{lb}</button>)}</div>{[{t:"🎧 RIC",ids:["moxi_s_r","moxi_s_312"]},{t:"🔊 BTE",ids:["stride_vpr","stride_vm312"]},{t:"👁️ Endoauricolare",ids:["insera_s_r","insera_s_nw"]},{t:"⚡ Instant Fit Quix",ids:["quix_r","quix_nw"]}].map(grp=>{const items=ff.filter(f=>grp.ids.includes(f.id));if(!items.length)return null;return<div key={grp.t} style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>{grp.t}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{items.map(f=>{const pr=uso==="bino"?f.livelli[livello]&&f.livelli[livello].bino:f.livelli[livello]&&f.livelli[livello].mono;return<Card key={f.id} selected={famiglia===f.id} onClick={()=>{setFamiglia(f.id);setPromo(false);setAccSel([]);}} style={{padding:"10px 12px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:17}}>{f.icona}</span>{f.ricaricabile&&<Badge color={GREEN}>Ricar.</Badge>}</div><div style={{fontWeight:800,fontSize:12,color:"#1a1a2e",marginBottom:1}}>{f.nome}</div><div style={{fontSize:10,color:"#888",marginBottom:5}}>{f.sottotipo}</div><div style={{fontWeight:800,fontSize:14,color:BRAND}}>€ {pr?pr.toLocaleString("it-IT"):"—"}</div>{famiglia===f.id&&f.note&&<p style={{margin:"6px 0 0",fontSize:10,color:"#888",fontStyle:"italic"}}>{f.note}</p>}</Card>;})} </div></div>;})} <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}><button style={btnS} onClick={()=>setStep(3)}>← Indietro</button><button style={{...btnP,opacity:famiglia?1:.5}} onClick={()=>famiglia&&setStep(5)} disabled={!famiglia}>Avanti →</button></div></Layout>;}

  if(step===5){const ad=famigliaObj?famigliaObj.accessori:[];return<Layout current={4} ap={ap}><h2 style={{color:BRAND,marginBottom:5,fontSize:19,fontWeight:900}}>Accessori</h2><p style={{color:"#666",marginBottom:12,fontSize:12}}>Compatibili con {famigliaObj?famigliaObj.nome:""}</p><div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>{ad.map(nome=>{const a=ACC[nome];if(nome==="Ricevitore"&&!(famigliaObj&&famigliaObj.ricevitore))return null;const nd=nome==="Ricevitore"?(uso==="bino"?"Ricevitori":"Ricevitore"):nome;const inc=a&&(a.incluso||(a.inclusoPerModello&&a.inclusoPerModello.includes(famigliaObj&&famigliaObj.id)));const sel=accessoriSel.includes(nome);return<div key={nome} onClick={()=>!inc&&a&&a.p&&toggleAcc(nome)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 13px",borderRadius:9,border:"2px solid",borderColor:inc?"#1a9e5e":sel?BRAND:"#e0e0e0",background:inc?"#f0fdf4":sel?"#e8f7fb":"#fff",cursor:!inc&&a&&a.p?"pointer":"default"}}><div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:600,fontSize:13}}>{nd}</span>{inc&&<span style={{background:GREEN,color:"#fff",borderRadius:20,padding:"1px 8px",fontSize:9,fontWeight:700}}>✓ Incluso</span>}</div><div style={{fontSize:10,color:"#888",marginTop:1}}>{inc?"Incluso":a&&a.p?`€ ${a.p}`:"-"}</div></div>{!inc&&a&&a.p&&<div style={{width:20,height:20,borderRadius:"50%",background:sel?BRAND:"#eee",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:800}}>{sel?"✓":"+"}</div>}{inc&&<span>✅</span>}</div>;})} <div style={{background:"#f9f9f9",borderRadius:10,padding:"11px 14px",marginTop:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:2}}><span>Listino</span><span>€ {fmt(prezzoBase)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN,fontWeight:700,marginBottom:2}}><span>Promozione -{scontoPromo}%</span><span>- € {fmt(prezzoBase*(scontoPromo/100))}</span></div>{accessoriSel.map(n=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:1}}><span>{n}</span><span>€ {ACC[n]&&ACC[n].p?ACC[n].p:""}</span></div>)}<div style={{borderTop:"1.5px solid #ddd",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:800,fontSize:13}}>Totale</span><span style={{fontWeight:900,fontSize:15,color:BRAND}}>€ {fmt(totaleFinale)}</span></div></div><div style={{display:"flex",justifyContent:"space-between",marginTop:14}}><button style={btnS} onClick={()=>setStep(4)}>← Indietro</button><button style={btnP} onClick={()=>setStep(6)}>Vai alla Proposta →</button></div></Layout>;}

  const oggi=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
  const nomePaz=`${paziente.nome} ${paziente.cognome}`.trim()||"Paziente";
  return<Layout current={5} ap={ap}>
    {numeroPreventivo&&<div style={{background:"#f0f8fb",border:`1.5px solid ${BRAND}`,borderRadius:9,padding:"7px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#555"}}>Preventivo n°</span><span style={{fontWeight:900,fontSize:16,color:BRAND}}>{numeroPreventivo}</span>{salvato&&<span style={{fontSize:10,background:GREEN,color:"#fff",borderRadius:20,padding:"2px 9px",fontWeight:700}}>✓ Salvato</span>}</div>}
    <DriveBanner status={driveStatus} onLogin={handleDriveLogin}/>
    <div style={{background:`linear-gradient(135deg,${BRAND},#0d8fad)`,borderRadius:12,padding:"14px 18px",color:"#fff",marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:9,opacity:.65,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Otosense Srl - Percorso Riabilitativo</div><div style={{fontSize:18,fontWeight:900}}>{nomePaz}</div>{paziente.data&&<div style={{fontSize:11,opacity:.8,marginTop:1}}>Nato/a il {new Date(paziente.data).toLocaleDateString("it-IT")}</div>}</div><div style={{textAlign:"right",fontSize:11,opacity:.75}}><div>{oggi}</div><div style={{fontWeight:700}}>Valida 30 giorni</div></div></div></div>
    <div style={{display:"flex",gap:10,alignItems:"center",padding:"9px 13px",background:livelloObj.light,borderRadius:9,marginBottom:10}}><div style={{width:34,height:34,borderRadius:8,background:livelloObj.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:15}}>{livelloObj.num}</div><div><div style={{fontWeight:800,fontSize:13}}>{livelloObj.label} {livelloObj.sublabel}</div><div style={{fontSize:10,color:"#666"}}>{livelloObj.ambiente}</div></div></div>
    <div style={{border:`1.5px solid #d0e8f0`,borderRadius:10,padding:"11px 14px",marginBottom:10}}><div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap"}}><Badge color={livelloObj.color}>{livelloObj.label}</Badge>{famigliaObj&&famigliaObj.ricaricabile&&<Badge color={GREEN}>Ricaricabile</Badge>}<Badge color="#555">{uso==="bino"?"Binaurale":"Monaurale"}</Badge></div><div style={{fontWeight:800,fontSize:14,color:"#1a1a2e",marginBottom:2}}>{famigliaObj&&famigliaObj.nome}</div><div style={{fontSize:11,color:"#888"}}>{famigliaObj&&famigliaObj.brand} - {famigliaObj&&famigliaObj.sottotipo}</div></div>
    {puoPromo&&<div style={{marginBottom:12}}>{!promoAttiva?<div style={{borderRadius:12,overflow:"hidden",border:"2px solid #e8a020"}}><div style={{background:"linear-gradient(135deg,#e8a020,#f0b830)",padding:"11px 16px",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>⏰</span><div style={{flex:1}}><div style={{fontWeight:900,fontSize:13,color:"#fff"}}>Sconto se prenota oggi la prova</div></div><div style={{background:"rgba(255,255,255,.25)",borderRadius:8,padding:"4px 10px",textAlign:"center"}}><div style={{fontWeight:900,fontSize:18,color:"#fff"}}>-{scontoPromo}%</div></div></div><div style={{background:"#fffbf0",padding:"12px 16px"}}><p style={{fontSize:12,color:"#555",marginBottom:10}}>Risparmia <strong style={{color:ACCENT}}>€ {fmt(prezzoBase*(scontoPromo/100))}</strong> prenotando oggi la prova gratuita.</p><button onClick={()=>setPromo(true)} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#e8a020,#f0b830)",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✅ Prenoto la prova - Attiva sconto {scontoPromo}%</button></div></div>:<div style={{borderRadius:12,border:"2px solid #1a9e5e",background:"#f0fdf4",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,color:GREEN}}>✅ Promozione -{scontoPromo}% attiva</span><button onClick={()=>setPromo(false)} style={{background:"none",border:"1px solid #ccc",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>✕</button></div>}</div>}
    <div style={{background:"#f8f9fa",borderRadius:10,padding:"11px 14px",marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:2}}><span>Listino</span><span><s>€ {fmt(prezzoBase)}</s></span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN,fontWeight:700,marginBottom:2}}><span>Promozione -{scontoPromo}%</span><span>- € {fmt(prezzoBase*(scontoPromo/100))}</span></div>{accessoriSel.map(n=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:1}}><span>{n}</span><span>€ {ACC[n]&&ACC[n].p?ACC[n].p:""}</span></div>)}<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:BRAND,marginTop:3}}><span style={{fontStyle:"italic"}}>Percorso 15 sedute</span><span style={{fontWeight:700}}>✓ Incluso</span></div><div style={{borderTop:"1.5px solid #ddd",marginTop:7,paddingTop:7,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>Totale</span><span style={{fontWeight:900,fontSize:15,color:BRAND}}>€ {fmt(totaleFinale)}</span></div></div>
    <div style={{background:`linear-gradient(135deg,${BRAND},#0d8fad)`,borderRadius:10,padding:"13px 16px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:11,opacity:.85,fontWeight:600}}>Totale Percorso Completo - IVA inclusa</div><div style={{fontSize:9,opacity:.6}}>Dispositivi + 15 sedute - Valida 30 giorni</div></div><div style={{fontSize:22,fontWeight:900}}>€ {fmt(totaleFinale)}</div></div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button style={btnS} onClick={()=>setStep(5)}>← Modifica</button>
      <button onClick={handleStampa} style={{...btnP,background:RED,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontSize:13}}>
        📄 Genera PDF {driveStatus==="ok"&&<span style={{fontSize:10,background:"rgba(255,255,255,.2)",borderRadius:20,padding:"1px 7px"}}>+ ☁️ Drive</span>}
      </button>
      <button style={{...btnP,background:GREEN}} onClick={reset}>+ Nuovo</button>
    </div>
    <p style={{fontSize:10,color:"#aaa",marginTop:8,textAlign:"center"}}>Il PDF viene scaricato sul PC e salvato su Drive</p>
  </Layout>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
