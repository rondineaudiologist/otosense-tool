/* ══ GOOGLE DRIVE UPLOAD ══ */
async function uploadToDrive(accessToken, fileName, content, mimeType) {
  const metadata = { name: fileName, parents: [DRIVE_FOLDER_ID], mimeType };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file",     new Blob([content],                  { type: mimeType }));
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
    method: "POST",
    headers: { Authorization: `Bearer ${accessToken}` },
    body: form,
  });
  return res.json();
}

function calcolaLivello(risposte) {
  let totP=0, totS=0;
  for(const [id,score] of Object.entries(risposte)){ const p=PESI[id]||1; totS+=score*p; totP+=p; }

  if(m<=1.4) return "BASE";
  if(m<=2.0) return "ESSENZIALE";
  if(m<=3.0) return "STANDARD";
  if(m<=4.0) return "AVANZATA";
  return "PREMIUM";
}

function getNextNumero(iniziali) {
  const anno=new Date().getFullYear();
  const key=`preventivi:contatore:${iniziali}:${anno}`;
  let n=1; const r=storage.get(key); if(r) n=parseInt(r.value)+1;
  storage.set(key,String(n));
  return `${iniziali}-${anno}-${String(n).padStart(3,"0")}`;
}

function salvaPreventivo(record) {
  storage.set(`preventivi:archivio:${record.numero}`, JSON.stringify(record));
}

function caricaArchivio() {
  const {keys}=storage.list("preventivi:archivio:");
  return (keys||[]).map(k=>{ try{ const r=storage.get(k); return r?JSON.parse(r.value):null; }catch(_){return null;} }).filter(Boolean).sort((a,b)=>b.numero.localeCompare(a.numero));
}

function stampaPDF(record) {
  const html = buildHTML(record);
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`Preventivo_${record.numero}.html`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

function App(){

  const [step, setStep]           = useState(0);
  const [paziente, setPaziente]   = useState({nome:"",cognome:"",data:""});
  const [risposte, setRisposte]   = useState({});
  const [dIdx, setDIdx]           = useState(0);
  const [livello, setLivello]     = useState(null);
  const [uso, setUso]             = useState("bino");
  const [famiglia, setFamiglia]   = useState(null);
  const [accessoriSel, setAccSel] = useState([]);
  const [promoAttiva, setPromo]   = useState(false);
  const [numeroPreventivo, setNumero] = useState(null);
  const [salvato, setSalvato]     = useState(false);

  // Google Drive state
  const [driveToken, setDriveToken]   = useState(null);
  const [driveStatus, setDriveStatus] = useState("idle"); // idle | loading | ok | error
  const tokenClientRef = useRef(null);

  useEffect(()=>{
    if(!window.google) return;
    tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: (resp) => {
        if(resp.error){ setDriveStatus("error"); return; }
        setDriveToken(resp.access_token);
        setDriveStatus("ok");
      },
    });
  },[]);

  const handleDriveLogin = () => {
    setDriveStatus("loading");
    if(tokenClientRef.current) tokenClientRef.current.requestAccessToken();
    else setDriveStatus("error");
  };

  const livelloObj  = LIVELLI.find(l=>l.id===livello);
  const famigliaObj = FAMIGLIE.find(f=>f.id===famiglia);
  const prezzoBase  = famigliaObj&&livello?(uso==="bino"?famigliaObj.livelli[livello]&&famigliaObj.livelli[livello].bino:famigliaObj.livelli[livello]&&famigliaObj.livelli[livello].mono)||0:0;
  const scontoPromo = PROMO_MAP[livello]||0;
  const totAcc      = accessoriSel.reduce((a,n)=>a+(ACC[n]&&ACC[n].p?ACC[n].p:0),0);
  const totaleFinale= prezzoBase*(1-scontoPromo/100)+totAcc;
  const fmt = n => n.toLocaleString("it-IT",{minimumFractionDigits:2});
  const puoPromo = scontoPromo>0;

  const rispondi=(id,score)=>{ const n={...risposte,[id]:score}; setRisposte(n); if(dIdx<DOMANDE.length-1) setDIdx(dIdx+1); else{ setLivello(calcolaLivello(n)); setStep(3); } };
  const toggleAcc=n=>setAccSel(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);

  const resetWorkflow=()=>{ setStep(0); setPaziente({nome:"",cognome:"",data:""}); setRisposte({}); setDIdx(0); setLivello(null); setFamiglia(null); setUso("bino"); setAccSel([]); setPromo(false); setNumero(null); setSalvato(false); };

  const handleGeneraPDF = async () => {
    let num = numeroPreventivo;
    if(!num){ num=getNextNumero(ap.iniziali); setNumero(num); }
    const oggi=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
    const record={ numero:num, data:oggi, audioprotesista:ap, paziente, livello, famiglia, uso, scontoApplicato:scontoPromo, prezzoBase, accessoriSel, totaleFinale, risposte, livelloObj, famigliaObj };
    if(!salvato){ salvaPreventivo(record); setSalvato(true); }

    // Scarica localmente
    stampaPDF(record);

    // Salva su Drive se autenticato
    if(driveToken){
      try {
        const htmlContent  = buildHTML(record);
        const jsonContent  = JSON.stringify(record, null, 2);
        await uploadToDrive(driveToken, `Preventivo_${num}.html`, htmlContent, "text/html");
        await uploadToDrive(driveToken, `Preventivo_${num}.json`, jsonContent, "application/json");
      } catch(e){
        console.error("Drive upload error", e);
      }
    }
  };

  /* LOGIN */
  if(schermata==="login") return(
    <Layout ap={null} current={null}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:48,marginBottom:10}}>👂</div>
        <h2 style={{color:BRAND,fontSize:22,fontWeight:900,marginBottom:6}}>Otosense Srl</h2>
        <p style={{color:"#666",fontSize:13}}>Seleziona il tuo nome per iniziare la sessione</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
        {AUDIOPROTESISTI.map(a=>(
          <div key={a.id} onClick={()=>{setAp(a);setSchermata("workflow");}}
            style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:12,border:"2px solid #e0e0e0",cursor:"pointer",background:"#fff",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=a.colore;e.currentTarget.style.background="#f8f8f8";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.background="#fff";}}>
            <div style={{width:46,height:46,borderRadius:"50%",background:a.colore,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:16,boxShadow:`0 4px 12px ${a.colore}55`}}>{a.iniziali}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:"#1a1a2e"}}>{a.nome}</div><div style={{fontSize:11,color:"#aaa"}}>Audioprotesista · Otosense Srl</div></div>
            <div style={{color:"#ccc",fontSize:20}}>→</div>
          </div>
        ))}
      </div>
      <div style={{borderTop:"1px solid #eee",paddingTop:16,textAlign:"center"}}>
        <button style={{...btnSecondary,fontSize:12}} onClick={()=>setSchermata("archivio")}>📋 Archivio Preventivi</button>
      </div>
    </Layout>
  );

  if(schermata==="archivio") return <Archivio ap={ap} onBack={()=>setSchermata(ap?"workflow":"login")}/>;

  /* STEP 0 — PAZIENTE */
  if(step===0) return(
    <Layout current={0} ap={ap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{color:BRAND,fontSize:19,fontWeight:900}}>Dati del Paziente</h2>
        <div style={{display:"flex",gap:8}}>
          <button style={{...btnSecondary,fontSize:11,padding:"6px 12px"}} onClick={()=>setSchermata("archivio")}>📋 Archivio</button>
          <button style={{...btnSecondary,fontSize:11,padding:"6px 12px",color:RED,borderColor:RED}} onClick={()=>{setAp(null);setSchermata("login");}}>⇦ Cambia</button>
        </div>
      </div>
      <DriveBanner status={driveStatus} onLogin={handleDriveLogin}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div><label style={labelStyle}>Nome</label><input style={inputStyle} value={paziente.nome} onChange={e=>setPaziente({...paziente,nome:e.target.value})} placeholder="Es. Mario"/></div>
        <div><label style={labelStyle}>Cognome</label><input style={inputStyle} value={paziente.cognome} onChange={e=>setPaziente({...paziente,cognome:e.target.value})} placeholder="Es. Rossi"/></div>
      </div>
      <div><label style={labelStyle}>Data di nascita</label><input type="date" style={{...inputStyle,width:"auto"}} value={paziente.data} onChange={e=>setPaziente({...paziente,data:e.target.value})}/></div>
      <div style={{marginTop:26,display:"flex",justifyContent:"flex-end"}}>
        <button style={btnPrimary} onClick={()=>setStep(1)}>Avvia Valutazione →</button>

      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button style={btnSecondary} onClick={()=>setStep(5)}>← Modifica</button>
        <button onClick={handleGeneraPDF} style={{...btnPrimary,background:RED,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontSize:13}}>
          📄 {driveStatus==="ok"?"Genera PDF + Salva su Drive":"Genera Preventivo PDF"}
          {driveStatus==="ok"&&<span style={{fontSize:10,background:"rgba(255,255,255,.2)",borderRadius:20,padding:"1px 7px"}}>☁️ Drive</span>}
        </button>
        <button style={{...btnPrimary,background:GREEN}} onClick={resetWorkflow}>+ Nuovo</button>
      </div>
      <p style={{fontSize:10,color:"#aaa",marginTop:8,textAlign:"center"}}>
        {driveStatus==="ok"?"✅ I preventivi vengono salvati automaticamente su Google Drive":"Connetti Google Drive per il salvataggio automatico"}
      </p>
    </Layout>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
