async function buildPDFFromHTML(record){
  return new Promise((resolve, reject)=>{
    // Crea iframe nascosto con l'HTML del preventivo
    const html=buildPrintHTML(record);
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;top:-9999px;left:-9999px;width:794px;height:1123px;border:none;visibility:hidden;";
    document.body.appendChild(iframe);
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    // Aspetta che le risorse si carichino
    setTimeout(async()=>{
      try{
        const canvas=await html2canvas(iframe.contentDocument.body,{
          scale:2,
          useCORS:true,
          allowTaint:true,
          backgroundColor:"#ffffff",
          width:794,
          height:1123,
          windowWidth:794,
          windowHeight:1123,
        });
        const{jsPDF}=window.jspdf;
        const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
        const imgData=canvas.toDataURL("image/jpeg",0.95);
        doc.addImage(imgData,"JPEG",0,0,210,297);
        document.body.removeChild(iframe);
        resolve(doc);
      } catch(e){
        document.body.removeChild(iframe);
        reject(e);
      }
    },1000);
  });
}

async function uploadToDrive(token, name, content){
  const meta={name, parents:[DRIVE_FOLDER_ID], mimeType:"application/pdf"};
  const form=new FormData();
  form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
  form.append("file",new Blob([content],{type:"application/pdf"}));
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
    method:"POST", headers:{Authorization:`Bearer ${token}`}, body:form
  });
  return r.json();
}

function calcolaLivello(r){
  let tp=0,ts=0;
  for(const[id,s]of Object.entries(r)){const p=PESI[id]||1;ts+=s*p;tp+=p;}
  const m=ts/tp;
  if(m<=1.4)return"BASE";if(m<=2.0)return"ESSENZIALE";if(m<=3.0)return"STANDARD";if(m<=4.0)return"AVANZATA";return"PREMIUM";
}

    <div style={{display:"flex",gap:10,alignItems:"center",padding:"9px 13px",background:livelloObj.light,borderRadius:9,marginBottom:10}}><div style={{width:34,height:34,borderRadius:8,background:livelloObj.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:15}}>{livelloObj.num}</div><div><div style={{fontWeight:800,fontSize:13}}>{livelloObj.label} {livelloObj.sublabel}</div><div style={{fontSize:10,color:"#666"}}>{livelloObj.ambiente}</div></div></div>
    <div style={{border:`1.5px solid #d0e8f0`,borderRadius:10,padding:"11px 14px",marginBottom:10}}><div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap"}}><Badge color={livelloObj.color}>{livelloObj.label}</Badge>{famigliaObj&&famigliaObj.ricaricabile&&<Badge color={GREEN}>Ricaricabile</Badge>}<Badge color="#555">{uso==="bino"?"Binaurale":"Monaurale"}</Badge></div><div style={{fontWeight:800,fontSize:14,color:"#1a1a2e",marginBottom:2}}>{famigliaObj&&famigliaObj.nome}</div><div style={{fontSize:11,color:"#888"}}>{famigliaObj&&famigliaObj.brand} · {famigliaObj&&famigliaObj.sottotipo}</div></div>
    {puoPromo&&<div style={{marginBottom:12}}>{!promoAttiva?<div style={{borderRadius:12,overflow:"hidden",border:"2px solid #e8a020"}}><div style={{background:"linear-gradient(135deg,#e8a020,#f0b830)",padding:"11px 16px",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>⏰</span><div style={{flex:1}}><div style={{fontWeight:900,fontSize:13,color:"#fff"}}>Sconto se prenota oggi la prova</div></div><div style={{background:"rgba(255,255,255,.25)",borderRadius:8,padding:"4px 10px",textAlign:"center"}}><div style={{fontWeight:900,fontSize:18,color:"#fff"}}>−{scontoPromo}%</div></div></div><div style={{background:"#fffbf0",padding:"12px 16px"}}><p style={{fontSize:12,color:"#555",marginBottom:10}}>Risparmia <strong style={{color:ACCENT}}>€ {fmt(prezzoBase*(scontoPromo/100))}</strong> prenotando oggi la prova gratuita.</p><button onClick={()=>setPromo(true)} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#e8a020,#f0b830)",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✅ Prenoto la prova — Attiva sconto {scontoPromo}%</button></div></div>:<div style={{borderRadius:12,border:"2px solid #1a9e5e",background:"#f0fdf4",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,color:GREEN}}>✅ Promozione −{scontoPromo}% attiva · Risparmio € {fmt(prezzoBase*(scontoPromo/100))}</span><button onClick={()=>setPromo(false)} style={{background:"none",border:"1px solid #ccc",borderRadius:7,padding:"4px 10px",fontSize:11,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>✕</button></div>}</div>}
    <div style={{background:"#f8f9fa",borderRadius:10,padding:"11px 14px",marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:2}}><span>Listino</span><span><s>€ {fmt(prezzoBase)}</s></span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN,fontWeight:700,marginBottom:2}}><span>Promozione −{scontoPromo}%</span><span>− € {fmt(prezzoBase*(scontoPromo/100))}</span></div>{accessoriSel.map(n=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:1}}><span>{n}</span><span>€ {ACC[n]&&ACC[n].p?ACC[n].p:""}</span></div>)}<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:BRAND,marginTop:3}}><span style={{fontStyle:"italic"}}>Percorso 15 sedute</span><span style={{fontWeight:700}}>✓ Incluso</span></div><div style={{borderTop:"1.5px solid #ddd",marginTop:7,paddingTop:7,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>Totale</span><span style={{fontWeight:900,fontSize:15,color:BRAND}}>€ {fmt(totaleFinale)}</span></div></div>
    <div style={{background:`linear-gradient(135deg,${BRAND},#0d8fad)`,borderRadius:10,padding:"13px 16px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div><div style={{fontSize:11,opacity:.85,fontWeight:600}}>Totale Percorso Completo · IVA inclusa</div><div style={{fontSize:9,opacity:.6}}>Dispositivi + 15 sedute · Valida 30 giorni</div></div><div style={{fontSize:22,fontWeight:900}}>€ {fmt(totaleFinale)}</div></div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button style={btnS} onClick={()=>setStep(5)}>← Modifica</button>
      <button onClick={handleStampa} style={{...btnP,background:RED,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontSize:13}}>
        🖨️ Stampa PDF {driveStatus==="ok"&&<span style={{fontSize:10,background:"rgba(255,255,255,.2)",borderRadius:20,padding:"1px 7px"}}>+ ☁️ Drive</span>}
      </button>
      <button style={{...btnP,background:GREEN}} onClick={reset}>+ Nuovo</button>
    </div>
    <p style={{fontSize:10,color:"#aaa",marginTop:8,textAlign:"center"}}>Si apre una finestra di stampa ottimizzata A4 · Scegli "Salva come PDF"</p>
  </Layout>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
